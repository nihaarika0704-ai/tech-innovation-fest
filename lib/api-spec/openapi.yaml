openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tech Innovation Fest API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event operations
  - name: registrations
    description: Registration operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/stats/summary:
    get:
      operationId: getEventsSummary
      tags: [events]
      summary: Summary of event statistics
      responses:
        "200":
          description: Events statistics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsSummary"

  /registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations (admin only)
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"

    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register a student for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "400":
          description: Validation error or duplicate registration
        "409":
          description: Already registered

  /registrations/{id}:
    delete:
      operationId: deleteRegistration
      tags: [registrations]
      summary: Delete a registration (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /registrations/stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [registrations]
      summary: Get admin dashboard analytics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      required: [id, name, description, category, venue, eventDate, organizer, totalSeats, seatsAvailable, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        venue:
          type: string
        eventDate:
          type: string
        organizer:
          type: string
        totalSeats:
          type: integer
        seatsAvailable:
          type: integer
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    EventInput:
      type: object
      required: [name, description, category, venue, eventDate, organizer, totalSeats]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
        venue:
          type: string
        eventDate:
          type: string
        organizer:
          type: string
        totalSeats:
          type: integer
          minimum: 1
        imageUrl:
          type: string

    EventUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        venue:
          type: string
        eventDate:
          type: string
        organizer:
          type: string
        totalSeats:
          type: integer
        seatsAvailable:
          type: integer
        imageUrl:
          type: string

    EventsSummary:
      type: object
      required: [totalEvents, totalSeats, categoryCounts]
      properties:
        totalEvents:
          type: integer
        totalSeats:
          type: integer
        categoryCounts:
          type: array
          items:
            type: object
            required: [category, count]
            properties:
              category:
                type: string
              count:
                type: integer

    Registration:
      type: object
      required: [id, name, email, rollNumber, department, eventId, eventName, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        rollNumber:
          type: string
        department:
          type: string
        eventId:
          type: integer
        eventName:
          type: string
        createdAt:
          type: string

    RegistrationInput:
      type: object
      required: [name, email, rollNumber, department, eventId]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        rollNumber:
          type: string
          minLength: 1
        department:
          type: string
          minLength: 1
        eventId:
          type: integer

    DashboardStats:
      type: object
      required: [totalRegistrations, totalEvents, registrationsByEvent, recentRegistrations]
      properties:
        totalRegistrations:
          type: integer
        totalEvents:
          type: integer
        registrationsByEvent:
          type: array
          items:
            type: object
            required: [eventId, eventName, count]
            properties:
              eventId:
                type: integer
              eventName:
                type: string
              count:
                type: integer
        recentRegistrations:
          type: array
          items:
            $ref: "#/components/schemas/Registration"

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminAuthResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    AdminSession:
      type: object
      required: [username, isAdmin]
      properties:
        username:
          type: string
        isAdmin:
          type: boolean
